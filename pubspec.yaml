name: openlist
description: OpenList - Collaborative notes and tasks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Backend
  supabase_flutter: ^2.3.4

  # AI
  google_generative_ai: ^0.4.0

  # Storage & Security
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Images
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  timeago: ^3.6.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
